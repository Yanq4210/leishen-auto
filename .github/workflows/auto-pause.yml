name: Auto Pause Leishen

on:
  schedule:
    # 周一到周五 北京时间 23:00 (对应 UTC 15:00)
    - cron: '0 15 * * 1-5'
    # 周六和周日 北京时间 01:00 (对应 UTC 17:00，跨日需注意)
    - cron: '0 17 * * 5,6'
  workflow_dispatch:

jobs:
  pause:
    runs-on: ubuntu-latest  # GitHub-hosted runner 默认已是最新版，无需担心
    steps:
    - uses: actions/checkout@v5.0.0

    - name: Set up Go
      uses: actions/setup-go@v6.0.0
      with:
        go-version: '1.24'

    - name: Cache Go modules
      uses: actions/cache@v5.0.4  # 使用最新 patch 版本
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      run: go mod tidy

    - name: Run Leishen Auto Pause
      env:
        TOKEN: ${{ secrets.TOKEN }}
      run: go run main.go
