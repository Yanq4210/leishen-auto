name: Auto Pause Leishen

on:
  schedule:
    # 周一到周五 北京时间 23:00 (对应 UTC 15:00)
    - cron: '0 15 * * 1-5'
    # 周六和周日 北京时间 01:00 (对应 UTC 17:00)
    # 注：GitHub 的 cron 星期按 UTC 计算，北京时间周末 01:00 实际落在 UTC 的周五/周六
    - cron: '0 17 * * 5,6'
  workflow_dispatch: # 允许手动触发

jobs:
  pause:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Cache Go modules
      uses: actions/cache@v4  # 已升级至最新 v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      run: go mod tidy

    - name: Run Leishen Auto Pause
      env:
        TOKEN: ${{ secrets.TOKEN }}
      run: go run main.go
